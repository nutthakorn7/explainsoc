const AID = "A7";
const TX = {
  th:{
    ttl:"SOC Alert Triage — งานติดป้าย (Annotator A7)",
    sub:"ตัดสินจาก<b>หลักฐานที่เห็นเท่านั้น</b> เหมือนตอน triage จริง · ไม่มีคำตอบถูก/ผิด · ทำทีละการ์ด · ห้ามย้อนดูการ์ดอื่น",
    q1:"1) นี่เป็นภัยจริงไหม?",
    q2:"2) Triage",
    q3:"3) Priority (1=ต่ำ … 5=สูง)",
    q4:"4) ความมั่นใจ (1=เดา … 5=มั่นใจมาก)",
    nxt:"บันทึก & ถัดไป →",
    ok:"กรุณาตอบครบ 4 ข้อ",
    dh:"เสร็จแล้ว ✓",
    dp:"ติดป้ายครบ N การ์ด — กดดาวน์โหลดไฟล์ผลแล้วส่งกลับให้ทีมวิจัย",
    db:"⬇ ดาวน์โหลดผล (JSON)",
    lb:"🌐 English"
  },
  en:{
    ttl:"SOC Alert Triage — Annotation Task (Annotator A7)",
    sub:"Judge based on <b>visible evidence only</b>, as in real triage · No right/wrong answers revealed · Work card by card · Do not go back",
    q1:"1) Is this a real threat?",
    q2:"2) Triage action",
    q3:"3) Priority (1=Low … 5=High)",
    q4:"4) Confidence (1=Guessing … 5=Very confident)",
    nxt:"Save & Next →",
    ok:"Please answer all 4 questions",
    dh:"Done ✓",
    dp:"Labeled N cards — please download the result file and send it back to the research team",
    db:"⬇ Download Results (JSON)",
    lb:"🌐 ภาษาไทย"
  }
};
let LANG="th";
function T(k){return TX[LANG][k]||k;}
function toggleLang(){LANG=LANG==="th"?"en":"th"; document.getElementById("ttl").textContent=T("ttl"); document.getElementById("sub").innerHTML=T("sub"); document.getElementById("lbtn").textContent=T("lb"); render();}
let i=0,t0=Date.now(); const out=[];
function render(){
 document.getElementById("ttl").textContent=T("ttl");
 document.getElementById("sub").innerHTML=T("sub");
 document.getElementById("lbtn").textContent=T("lb");
 if(i>=CARDS.length){finish();return;}
 const c=CARDS[i]; const f=c.flow;
 document.getElementById('app').innerHTML=`
  <div class="card">
   <div class="sub">case ${c.case_id}</div>
   <div class="q">Network flow</div>
   <div class="mono">${f.src}  →  ${f.dst}
duration=${f.duration_s}s   fwd_pkts=${f.fwd_pkts}   bwd_pkts=${f.bwd_pkts}   bytes/s=${f.bytes_per_s}
recent alerts from src: 1h=${f.recent_alerts_1h}  24h=${f.recent_alerts_24h}  repeated_target=${f.repeated_target}</div>
   <div class="q">Context</div>
   <div class="mono ctx">asset: ${c.asset_context}
geo / threat-intel: ${c.geo_threatintel}
payload: ${c.payload_snippet}</div>
   <div class="q">${T("q1")}</div>
   <div>${['malicious','benign','unsure'].map(v=>`<label class="opt"><input type="radio" name="tpfp" value="${v}"><span>${v}</span></label>`).join('')}</div>
   <div class="q">${T("q2")}</div>
   <div>${['suppress','investigate','escalate'].map(v=>`<label class="opt"><input type="radio" name="triage" value="${v}"><span>${v}</span></label>`).join('')}</div>
   <div class="q">${T("q3")}</div>
   <div>${[1,2,3,4,5].map(v=>`<label class="opt"><input type="radio" name="prio" value="${v}"><span>${v}</span></label>`).join('')}</div>
   <div class="q">${T("q4")}</div>
   <div>${[1,2,3,4,5].map(v=>`<label class="opt"><input type="radio" name="conf" value="${v}"><span>${v}</span></label>`).join('')}</div>
   <div class="bar"><span class="prog">${i+1} / ${CARDS.length}</span>
     <button onclick="next()">${T("nxt")}</button></div>
  </div>`;
 t0=Date.now();
}
function val(n){const e=document.querySelector(`input[name=${n}]:checked`);return e?e.value:null;}
function next(){
 const r={tpfp:val('tpfp'),triage:val('triage'),priority:val('prio'),confidence:val('conf')};
 if(!r.tpfp||!r.triage||!r.priority||!r.confidence){alert(T("ok"));return;}
 r.case_id=CARDS[i].case_id; r.dwell_ms=Date.now()-t0; r.idx=i; out.push(r); i++; render();
}
function finish(){
 const n=out.length;
 const blob=new Blob([JSON.stringify({annotator:AID,n:n,labels:out},null,1)],{type:'application/json'});
 const url=URL.createObjectURL(blob);
 document.getElementById('app').innerHTML=`<div class="card"><h2>${T("dh")}</h2>
   <p>${T("dp").replace("N",n)}</p>
   <a href="${url}" download="annotation_${AID}.json"><button>${T("db")}</button></a></div>`;
}
render();
